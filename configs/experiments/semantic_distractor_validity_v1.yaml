name: semantic_distractor_validity_v1
description: Targeted long experiment contrasting query-aware detection selection with first-detection controls under semantic distractor stressors.
env_backend: maniskill
tasks:
  - PickCube
  - StackCube
  - PickSingleYCB
  - PickClutterYCB
baselines:
  - oracle_target
  - box_center_depth_query_aware
  - crop_median_depth_query_aware
  - box_center_depth_first_detection
  - crop_median_depth_first_detection
  - crop_top_surface_query_aware
  - crop_top_surface_first_detection
stressors:
  - none
  - same_shape_distractor
  - same_color_distractor
  - nearby_distractor
  - partial_target_occlusion
  - same_color_partial_occlusion
  - same_shape_nearby_occlusion
levels: [0, 1, 2, 3]
seed_range:
  start: 800
  stop: 1000
default_query: "pick the target object"
