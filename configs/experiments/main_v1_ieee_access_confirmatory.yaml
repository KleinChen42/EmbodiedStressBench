name: main_v1_ieee_access_confirmatory
description: Confirmatory Main v1 extension using held-out seeds after the primary 100-seed run.
env_backend: maniskill
tasks:
  - PickCube
  - StackCube
  - PickSingleYCB
  - PickClutterYCB
baselines:
  - oracle_target
  - box_center_depth
  - crop_median_depth
  - crop_top_surface
stressors:
  - none
  - same_shape_distractor
  - same_color_distractor
  - nearby_distractor
  - partial_target_occlusion
  - depth_sparsity
  - execution_offset_strong
levels: [0, 1, 2, 3]
seed_range:
  start: 100
  stop: 150
default_query: "pick the target object"
