name: open_vocab_grounding_dino_order_debug
env_backend: maniskill
description: >
  Order-sensitive debug gate that runs metadata baselines before GroundingDINO,
  matching the small bridge matrix order. Use with LD_PRELOAD for libgomp.
tasks:
  - PickCube
default_query: "red cube"
baselines:
  - oracle_target
  - box_center_depth_query_aware
  - crop_median_depth_query_aware
  - box_center_depth_grounding_dino
stressors:
  - visual_occlusion
levels: [0]
seeds: [0, 1, 2, 3, 4, 5, 6, 7, 8]
expected_episodes: 36
detector_plugins:
  - metadata_query_aware
  - grounding_dino
