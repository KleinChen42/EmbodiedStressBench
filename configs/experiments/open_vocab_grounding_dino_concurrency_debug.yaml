name: open_vocab_grounding_dino_concurrency_debug
env_backend: maniskill
description: >
  Nine-worker concurrency gate for GroundingDINO provider initialization. This
  catches provider-unavailable failures before launching the small bridge run.
tasks:
  - PickCube
default_query: "red cube"
baselines:
  - box_center_depth_grounding_dino
stressors:
  - visual_occlusion
levels: [0]
seeds: [0, 1, 2, 3, 4, 5, 6, 7, 8]
expected_episodes: 9
detector_plugins:
  - grounding_dino
