name: closed_loop_oracle_calibration_v2
env_backend: maniskill
description: >
  Gated closed-loop calibration subset for Scientific Reports. This is a
  scripted executor sanity check, not a learned policy benchmark.
tasks:
  - PickCube
  - PickSingleYCB
default_query: "target object"
task_queries:
  PickCube: "red cube"
  PickSingleYCB: "target object"
baselines:
  - oracle_target
  - box_center_depth
  - crop_median_depth
stressors:
  - none
  - partial_target_occlusion
levels: [0, 3]
seed_range:
  start: 0
  stop: 50
expected_episodes: 1200
paper_use: >
  Use as positive calibration evidence only if the oracle smoke gate passes,
  duplicate count is zero, runner_exception count is zero, and oracle task
  success remains nonzero in the full calibration.
