name: open_vocab_grounding_dino_smoke
env_backend: maniskill
description: >
  Smoke matrix for a real open-vocabulary GroundingDINO detector bridge. This
  is intentionally small and PickCube-only because the current ManiSkill YCB
  adapter exposes generic target labels rather than object-category prompts.
tasks:
  - PickCube
default_query: "red cube"
baselines:
  - oracle_target
  - box_center_depth_query_aware
  - crop_median_depth_query_aware
  - box_center_depth_grounding_dino
  - crop_median_depth_grounding_dino
stressors:
  - visual_occlusion
  - partial_target_occlusion
levels: [0, 1]
seeds: [0, 1, 2, 3, 4]
expected_episodes: 100
detector_plugins:
  - metadata_query_aware
  - grounding_dino
