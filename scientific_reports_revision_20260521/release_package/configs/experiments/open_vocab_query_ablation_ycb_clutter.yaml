name: open_vocab_query_ablation_ycb_clutter
env_backend: maniskill
description: >
  Small Scientific Reports query-ablation for the GroundingDINO bridge on YCB
  and clutter tasks. This tests whether the held-out no-detection result is
  caused by a generic prompt rather than by the benchmark protocol itself.
tasks:
  - PickSingleYCB
  - PickClutterYCB
default_query: "target object"
query_variants:
  generic: "target object"
  object_label: "{target_label}"
  category: "{target_category}"
  label_phrase: "the {target_label}"
baselines:
  - crop_median_depth_grounding_dino
  - crop_trimmed_median_depth_grounding_dino
  - crop_median_depth_query_aware
  - crop_trimmed_median_depth_query_aware
stressors:
  - same_color_distractor
  - same_shape_distractor
  - partial_target_occlusion
  - depth_sparsity
levels: [0, 3]
seed_range:
  start: 90
  stop: 105
expected_episodes: 3840
detector_plugins:
  - metadata_query_aware
  - grounding_dino
paper_use: >
  Use only after audit confirms expected count, duplicate count 0, runner
  exceptions 0, and query_variant rows are present. If object_label remains
  generic because the ManiSkill task does not expose object names, report that
  as a benchmark-adapter limitation rather than as detector evidence.
